<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>llama.node WASM Test</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f7f7f5;
        --fg: #181916;
        --muted: #62665c;
        --line: #d8dbd2;
        --ok: #1f7a4f;
        --bad: #b3261e;
        --panel: #ffffff;
        --accent: #0b57d0;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #151713;
          --fg: #f2f3ed;
          --muted: #b9bdae;
          --line: #34382f;
          --panel: #1e211c;
          --accent: #8ab4f8;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      main {
        width: min(1120px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 28px 0;
      }

      header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 16px;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--line);
      }

      h1 {
        margin: 0;
        font-size: 24px;
        font-weight: 650;
      }

      .runtime {
        color: var(--muted);
        text-align: right;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
        margin-top: 20px;
      }

      section {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 16px;
      }

      label {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 650;
        text-transform: uppercase;
      }

      input,
      textarea {
        width: 100%;
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: transparent;
        color: inherit;
        padding: 10px 12px;
        font: inherit;
      }

      textarea {
        min-height: 88px;
        resize: vertical;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 160px;
        gap: 10px;
        margin-top: 12px;
      }

      .toggle {
        display: inline-flex;
        gap: 8px;
        align-items: center;
        margin-top: 12px;
        color: var(--muted);
        font-weight: 650;
      }

      .toggle input {
        width: auto;
      }

      button {
        min-height: 40px;
        border: 0;
        border-radius: 6px;
        background: var(--accent);
        color: white;
        font-weight: 650;
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .checks {
        display: grid;
        gap: 8px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .checks li {
        display: grid;
        grid-template-columns: 84px 1fr;
        gap: 10px;
        min-height: 30px;
        align-items: center;
        border-bottom: 1px solid var(--line);
      }

      .checks li:last-child {
        border-bottom: 0;
      }

      .status {
        font-weight: 700;
        color: var(--muted);
      }

      .status.pass {
        color: var(--ok);
      }

      .status.fail {
        color: var(--bad);
      }

      pre {
        min-height: 360px;
        max-height: 620px;
        margin: 0;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
        color: #e9f0df;
        background: #151713;
        border-radius: 8px;
        padding: 14px;
      }

      @media (max-width: 820px) {
        header,
        .grid,
        .row {
          display: block;
        }

        .runtime {
          margin-top: 8px;
          text-align: left;
        }

        button {
          width: 100%;
          margin-top: 10px;
        }

        section + section {
          margin-top: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>llama.node WASM</h1>
        </div>
        <div class="runtime" id="runtime"></div>
      </header>

      <div class="grid">
        <section>
          <label for="model-url">Model URL</label>
          <input
            id="model-url"
            value="https://huggingface.co/Durlabh/gemma-270m-q4-k-m-gguf/resolve/main/gemma3-270m-it-q4_k_m.gguf"
          />
          <label class="toggle" for="use-gpu">
            <input id="use-gpu" type="checkbox" />
            <span>WebGPU</span>
          </label>

          <div class="row">
            <div>
              <label for="prompt">Prompt</label>
              <textarea id="prompt">Return one short sentence about WebAssembly.</textarea>
            </div>
            <button id="run">Run Checks</button>
          </div>
        </section>

        <section>
          <ul class="checks">
            <li><span class="status" id="s-load">wait</span><span>load URL</span></li>
            <li><span class="status" id="s-ui">wait</span><span>UI responsive while WASM runs</span></li>
            <li><span class="status" id="s-token">wait</span><span>tokenize / detokenize</span></li>
            <li><span class="status" id="s-completion">wait</span><span>completion</span></li>
            <li><span class="status" id="s-state">wait</span><span>save buffer / load URL</span></li>
            <li><span class="status" id="s-tools">wait</span><span>tool_calls format / parse</span></li>
          </ul>
        </section>
      </div>

      <section style="margin-top: 18px">
        <pre id="log"></pre>
      </section>
    </main>

    <script type="module">
      import {
        WASM_MODEL_SIZE_LIMIT,
        initLlama,
        isWebGpuSupported,
        isWasmThreadsSupported,
        isWasmWorkerSupported,
        loadModel,
      } from '../../packages/node-llama-wasm/index.js'

      globalThis.llamaNodeWasm = {
        initLlama,
        isWebGpuSupported,
        isWasmThreadsSupported,
        isWasmWorkerSupported,
        loadModel,
        WASM_MODEL_SIZE_LIMIT,
      }

      const $ = (id) => document.getElementById(id)
      const runButton = $('run')
      const logEl = $('log')
      const statusIds = ['load', 'ui', 'token', 'completion', 'state', 'tools']

      const webGpuSupported = isWebGpuSupported()
      $('runtime').textContent = [
        webGpuSupported ? 'WebGPU detected' : 'WebGPU unavailable',
        isWasmWorkerSupported() ? 'Worker runtime' : 'Main thread runtime',
        isWasmThreadsSupported() ? 'WASM threads' : 'single-thread WASM',
        `model limit ${Math.round(WASM_MODEL_SIZE_LIMIT / 1024 / 1024)} MB`,
      ].join(' | ')
      $('use-gpu').checked = false
      $('use-gpu').disabled = !webGpuSupported

      const log = (message, value) => {
        const suffix =
          value === undefined ? '' : `\n${JSON.stringify(value, null, 2)}`
        logEl.textContent += `${new Date().toISOString()} ${message}${suffix}\n`
        logEl.scrollTop = logEl.scrollHeight
      }

      const setStatus = (id, state) => {
        const el = $(`s-${id}`)
        el.textContent = state
        el.className = `status ${state === 'pass' ? 'pass' : state === 'fail' ? 'fail' : ''}`
      }

      const assert = (condition, message) => {
        if (!condition) throw new Error(message)
      }

      const startFrameCounter = () => {
        let frames = 0
        let running = true
        const tick = () => {
          if (!running) return
          frames++
          requestAnimationFrame(tick)
        }
        requestAnimationFrame(tick)
        return {
          stop: () => {
            running = false
            return frames
          },
        }
      }

      const assertResponsive = (label, elapsedMs, frames) => {
        assert(
          elapsedMs < 100 || frames > 0,
          `${label} blocked the UI thread for ${Math.round(elapsedMs)}ms`,
        )
      }

      const tools = [
        {
          type: 'function',
          function: {
            name: 'get_weather',
            description: 'Returns the weather for a city.',
            parameters: {
              type: 'object',
              properties: {
                city: {
                  type: 'string',
                  description: 'City name',
                },
              },
              required: ['city'],
            },
          },
        },
      ]

      runButton.addEventListener('click', async () => {
        runButton.disabled = true
        logEl.textContent = ''
        for (const id of statusIds) setStatus(id, 'run')

        let context
        try {
          const model = $('model-url').value.trim()
          const prompt = $('prompt').value.trim()

          const loadFrames = startFrameCounter()
          const loadStarted = performance.now()
          context = await loadModel(
            {
              model,
              n_ctx: 2048,
              n_batch: 256,
              n_ubatch: 128,
              n_gpu_layers: $('use-gpu').checked ? 99999 : 0,
              use_mmap: false,
            },
            (progress) => log(`download ${progress}%`),
          )
          const loadMs = performance.now() - loadStarted
          const loadFrameCount = loadFrames.stop()
          assertResponsive('loadModel()', loadMs, loadFrameCount)
          setStatus('load', 'pass')
          log('model loaded', {
            modelInfo: context.getModelInfo(),
            uiFrames: loadFrameCount,
            elapsedMs: Math.round(loadMs),
          })

          const tokenized = await context.tokenize('llama.node wasm')
          const detokenized = await context.detokenize(tokenized.tokens)
          assert(tokenized.tokens.length > 0, 'tokenize returned no tokens')
          assert(detokenized.length > 0, 'detokenize returned empty text')
          setStatus('token', 'pass')
          log('token round-trip', {
            tokens: Array.from(tokenized.tokens),
            text: detokenized,
          })

          const streamedProbs = []
          const completionFrames = startFrameCounter()
          const completionStarted = performance.now()
          const completion = await context.completion(
            {
              prompt,
              n_predict: 48,
              n_probs: 2,
              temperature: 0,
              seed: 7,
              stop: ['</s>', '<end_of_turn>'],
            },
            ({ token, completion_probabilities }) => {
              if (completion_probabilities) streamedProbs.push(...completion_probabilities)
              log(`token ${JSON.stringify(token)}`)
            },
          )
          const completionMs = performance.now() - completionStarted
          const completionFrameCount = completionFrames.stop()
          assertResponsive('completion()', completionMs, completionFrameCount)
          setStatus('ui', 'pass')
          log('ui responsive', {
            load_frames: loadFrameCount,
            completion_frames: completionFrameCount,
            completion_ms: Math.round(completionMs),
          })
          assert(completion.text.length > 0, 'completion returned empty text')
          assert(
            completion.completion_probabilities?.length > 0,
            'completion probabilities were not returned',
          )
          assert(streamedProbs.length > 0, 'streamed probabilities were not returned')
          setStatus('completion', 'pass')
          log('completion result', completion)

          const saved = await context.saveSession()
          assert(saved.byteLength > 0, 'session buffer is empty')
          const sessionUrl = URL.createObjectURL(new Blob([saved]))
          try {
            await context.loadSession(sessionUrl)
          } finally {
            URL.revokeObjectURL(sessionUrl)
          }
          setStatus('state', 'pass')
          log('state restored', { bytes: saved.byteLength })

          const formatted = context.getFormattedChat(
            [{ role: 'user', content: 'What is the weather in Taipei?' }],
            undefined,
            { tools, tool_choice: 'auto' },
          )
          assert(formatted.prompt?.length > 0, 'tool chat prompt is empty')
          assert(
            formatted.type === 'llama-chat' ||
              formatted.grammar ||
              formatted.chat_parser,
            'tool chat formatter did not return grammar or parser data',
          )

          const toolCompletion = await context.completion({
            messages: [
              {
                role: 'user',
                content: 'Use the provided tool to get the weather in Taipei.',
              },
            ],
            tools,
            tool_choice: 'auto',
            n_predict: 80,
            temperature: 0,
            seed: 9,
            stop: ['</s>', '<end_of_turn>'],
          })
          setStatus('tools', 'pass')
          log('tool formatted chat', formatted)
          log('tool completion result', toolCompletion)
        } catch (error) {
          const pending = statusIds.find((id) => $('s-' + id).textContent === 'run')
          if (pending) setStatus(pending, 'fail')
          log(error?.stack || error?.message || String(error))
        } finally {
          if (context) await context.release()
          runButton.disabled = false
        }
      })
    </script>
  </body>
</html>
